<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Tech Quiz Game</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background-color:#0b1120;
color:white;
font-family:'Inter',sans-serif;
}

.glass{
background:#131b2e;
border:1px solid #1f2937;
}

.option-card{
background:#131b2e;
border:1px solid #374151;
transition:0.2s;
}

.option-card:hover{
border-color:#6366f1;
}

.correct{
background:#064e3b !important;
border-color:#10b981 !important;
}

.wrong{
background:#7f1d1d !important;
border-color:#ef4444 !important;
}

.btn-grad{
background:linear-gradient(90deg,#ec4899,#8b5cf6);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div id="game-container" class="w-full max-w-sm glass rounded-[32px] p-6 shadow-2xl relative overflow-hidden">

<div id="start-screen" class="text-center py-6">

<div class="mb-6 flex justify-center">
<div class="w-20 h-20 bg-[#1e293b] rounded-full flex items-center justify-center text-3xl">
☕
</div>
</div>

<h1 class="text-2xl font-bold mb-2">
TECH QUIZ GAME
</h1>

<p class="text-indigo-400 text-sm font-semibold mb-10">
JAVA EDITION
</p>

<div class="flex justify-center gap-4 mb-10">
<div class="w-12 h-12 rounded-xl bg-[#1e293b] flex items-center justify-center">🧠</div>
<div class="w-12 h-12 rounded-xl bg-[#1e293b] flex items-center justify-center">&lt;/&gt;</div>
<div class="w-12 h-12 rounded-xl bg-[#1e293b] flex items-center justify-center">⚙️</div>
</div>

<div class="glass p-4 rounded-2xl mb-8 text-left">
<p class="font-bold text-sm">
Test Your Tech Knowledge
</p>

<p class="text-[11px] opacity-60">
15 Questions • 10 Points Each • Best of Luck!
</p>
</div>

<button onclick="playClick(); startQuiz()"
class="btn-grad w-full py-4 rounded-2xl font-bold shadow-lg">
▶ START QUIZ
</button>

</div>

<div id="quiz-screen" class="hidden">

<div class="flex justify-between gap-2 mb-6">

<div class="text-center p-3 w-1/3 glass rounded-xl">
<p class="text-[9px] opacity-50">QUESTION</p>
<p id="q-num" class="font-bold text-sm">1 / 15</p>
</div>

<div class="text-center p-3 w-1/3 glass rounded-xl">
<p class="text-[9px] opacity-50">SCORE</p>
<p id="score" class="font-bold text-sm">0</p>
</div>

<div class="text-center p-3 w-1/3 glass rounded-xl">
<p class="text-[9px] opacity-50">POINTS</p>
<p class="font-bold text-sm text-yellow-500">10</p>
</div>

</div>

<div class="h-1.5 w-full bg-[#1e293b] rounded-full mb-8">
<div id="progress"
class="h-full bg-emerald-500 rounded-full"
style="width:6.6%">
</div>
</div>

<h2 id="question"
class="text-md font-medium mb-6 leading-relaxed">
Loading...
</h2>

<div id="options" class="space-y-3 mb-6"></div>

<div id="feedback"
class="hidden glass p-4 rounded-xl mb-4 text-sm font-bold">
</div>

<button id="next-btn"
onclick="playClick(); nextQuestion()"
class="hidden btn-grad w-full py-3 rounded-xl font-bold">
NEXT →
</button>

</div>

<div id="result-screen" class="hidden text-center py-12">

<h2 class="text-2xl font-bold mb-2">
Quiz Finished!
</h2>

<p class="text-sm opacity-60 mb-8">
Your Final Score is
</p>

<p class="text-6xl font-bold text-emerald-400 mb-10"
id="final-score">
0
</p>

<button onclick="location.reload()"
class="btn-grad w-full py-4 rounded-2xl font-bold">
RESTART GAME
</button>

</div>

</div>

<script>

const data=[

["What is the file extension of a compiled Java class file?",".java",".class",".txt",".exe",1],

["Which keyword is used to create a subclass?","implements","extends","super","this",1],

["What is the primary purpose of Garbage Collection?","To create new objects","To delete unused objects","To optimize speed","To fix errors",1],

["Which method is the entry point of Java programs?","start()","run()","main()","init()",2],

["Which class is used to take user input?","Scanner","Input","Reader","System",0],

["Which keyword prevents method overriding?","static","abstract","final","void",2],

["Is Java a platform-dependent language?","Yes","No","Sometimes","Never",1],

["What does JVM stand for?","Java Virtual Machine","Java Vision Method","Java Variable Model","None",0],

["Which is not a primitive data type?","int","boolean","String","double",2],

["Which operator is used to compare two values?","=","==","===","equals",1],

["What is an interface?","A class","A variable","A blueprint","A package",2],

["Which package contains Scanner?","java.io","java.util","java.net","java.lang",1],

["Can a class extend more than one class?","Yes","No","Sometimes","Only in Java 8",1],

["What is the size of int in Java?","2 bytes","4 bytes","8 bytes","1 byte",1],

["Which modifier makes a variable constant?","static","volatile","final","transient",2]

];

let cur=0;
let score=0;

const ctx=new(window.AudioContext||window.webkitAudioContext)();

function playTone(f,d){
const o=ctx.createOscillator();
const g=ctx.createGain();

o.frequency.value=f;

o.connect(g);

g.connect(ctx.destination);

g.gain.exponentialRampToValueAtTime(
0.01,
ctx.currentTime+d
);

o.start();

o.stop(ctx.currentTime+d);
}

function playClick(){
playTone(500,0.1);
}

function startQuiz(){

document.getElementById("start-screen")
.classList.add("hidden");

document.getElementById("quiz-screen")
.classList.remove("hidden");

showQ();

}

function showQ(){

document.getElementById("q-num")
.innerText=`${cur+1} / 15`;

document.getElementById("progress")
.style.width=
`${(cur+1)/15*100}%`;

document.getElementById("question")
.innerText=
`Q${cur+1}. ${data[cur][0]}`;

const ops=
document.getElementById("options");

ops.innerHTML="";

document.getElementById("next-btn")
.classList.add("hidden");

document.getElementById("feedback")
.classList.add("hidden");

for(let i=0;i<4;i++){

const b=
document.createElement("div");

b.className=
"option-card p-4 rounded-xl cursor-pointer text-sm font-medium";

b.innerText=
String.fromCharCode(65+i)
+". "
+data[cur][i+1];

b.onclick=()=>check(i,b);

ops.appendChild(b);

}

}

function check(idx,el){

const all=
document.querySelectorAll(".option-card");

all.forEach(
b=>b.style.pointerEvents="none"
);

const fb=
document.getElementById("feedback");

if(idx==data[cur][5]){

el.classList.add("correct");

score+=10;

document.getElementById("score")
.innerText=score;

fb.innerText=
"Correct Answer! +10 Points";

fb.className=
"glass p-4 rounded-xl mb-4 text-sm font-bold text-emerald-400 block";

playTone(800,0.2);

}

else{

el.classList.add("wrong");

all[data[cur][5]]
.classList.add("correct");

fb.innerText=
"Wrong Answer!";

fb.className=
"glass p-4 rounded-xl mb-4 text-sm font-bold text-red-400 block";

playTone(200,0.3);

}

document.getElementById("next-btn")
.classList.remove("hidden");

}

function nextQuestion(){

cur++;

if(cur<data.length){

showQ();

}

else{

document.getElementById("quiz-screen")
.classList.add("hidden");

document.getElementById("result-screen")
.classList.remove("hidden");

document.getElementById("final-score")
.innerText=score;

}

}

</script>

</body>
  </html>
